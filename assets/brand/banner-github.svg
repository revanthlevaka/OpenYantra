<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c6fff"/>
      <stop offset="32%" stop-color="#5535e0"/>
      <stop offset="66%" stop-color="#e84520"/>
      <stop offset="100%" stop-color="#f5a000"/>
    </linearGradient>
    <linearGradient id="markG" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c6fff"/>
      <stop offset="33%" stop-color="#5535e0"/>
      <stop offset="66%" stop-color="#e84520"/>
      <stop offset="100%" stop-color="#f5a000"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.017)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="#0a0a0b"/>
  <rect width="1280" height="400" fill="url(#grid)"/>

  <!-- Top strip -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#grad)"/>

  <!-- Mandala watermark right -->
  <g transform="translate(1000, 200)" opacity="0.055" stroke="white" stroke-width="0.5" fill="none">
    <circle cx="0" cy="0" r="244"/>
    <circle cx="0" cy="0" r="180"/>
    <circle cx="0" cy="0" r="120"/>
    <circle cx="0" cy="0" r="70"/>
    <line x1="0" y1="-244" x2="0" y2="244"/>
    <line x1="-244" y1="0" x2="244" y2="0"/>
    <line x1="-172" y1="-172" x2="172" y2="172"/>
    <line x1="172" y1="-172" x2="-172" y2="172"/>
    <path d="M0 -244 Q62 -122 0 0 Q-62 -122 0 -244"/>
    <path d="M244 0 Q122 62 0 0 Q122 -62 244 0"/>
    <path d="M0 244 Q-62 122 0 0 Q62 122 0 244"/>
    <path d="M-244 0 Q-122 -62 0 0 Q-122 62 -244 0"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(60, 200)">
    <circle cx="0" cy="0" r="47" stroke="url(#markG)" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="0" r="30" stroke="url(#markG)" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="0" cy="0" r="4" fill="url(#markG)"/>
    <circle cx="0" cy="-47" r="3" fill="#1c6fff"/>
    <circle cx="47" cy="0" r="3" fill="#5535e0"/>
    <circle cx="0" cy="47" r="3" fill="#e84520"/>
    <circle cx="-47" cy="0" r="3" fill="#f5a000"/>
    <path d="M0 -47 Q13 -23 0 0 Q-13 -23 0 -47" stroke="url(#markG)" stroke-width="0.9" fill="none" opacity="0.42"/>
    <path d="M47 0 Q23 13 0 0 Q23 -13 47 0" stroke="url(#markG)" stroke-width="0.9" fill="none" opacity="0.42"/>
    <path d="M0 47 Q-13 23 0 0 Q13 23 0 47" stroke="url(#markG)" stroke-width="0.9" fill="none" opacity="0.42"/>
    <path d="M-47 0 Q-23 -13 0 0 Q-23 13 -47 0" stroke="url(#markG)" stroke-width="0.9" fill="none" opacity="0.42"/>
  </g>

  <!-- Main text -->
  <text x="140" y="170" font-family="'IBM Plex Mono', monospace" font-size="52" font-weight="300" letter-spacing="-1.5" fill="#e8e5de">Open</text>
  <text x="285" y="170" font-family="'IBM Plex Mono', monospace" font-size="52" font-weight="600" letter-spacing="-1.5" fill="url(#grad)">Yantra</text>
  <text x="140" y="200" font-family="'IBM Plex Mono', monospace" font-size="13" letter-spacing="3" fill="rgba(232,229,222,0.45)">v3.0.0</text>

  <text x="140" y="242" font-family="'IBM Plex Sans', sans-serif" font-size="15" font-weight="300" fill="rgba(232,229,222,0.45)">Local-first personal memory for AI agents.</text>
  <text x="140" y="264" font-family="'IBM Plex Sans', sans-serif" font-size="15" font-weight="300" fill="rgba(232,229,222,0.35)">One file. One trusted writer. Any agent. Zero cloud.</text>

  <!-- Badges -->
  <rect x="140" y="290" width="80" height="22" fill="none" stroke="rgba(28,111,255,0.4)" rx="0"/>
  <text x="180" y="305" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="1.5" fill="#1c6fff" text-anchor="middle">LOCAL-FIRST</text>

  <rect x="228" y="290" width="95" height="22" fill="none" stroke="rgba(85,53,224,0.35)" rx="0"/>
  <text x="275" y="305" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="1.5" fill="#5535e0" text-anchor="middle">SINGLE WRITER</text>

  <rect x="331" y="290" width="90" height="22" fill="none" stroke="rgba(245,160,0,0.4)" rx="0"/>
  <text x="376" y="305" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="1.5" fill="#f5a000" text-anchor="middle">SHA-256 AUDIT</text>

  <rect x="429" y="290" width="75" height="22" fill="none" stroke="rgba(26,161,103,0.4)" rx="0"/>
  <text x="466" y="305" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="1.5" fill="#1aa167" text-anchor="middle">MIT LICENSE</text>

  <!-- Divider -->
  <line x1="580" y1="120" x2="580" y2="280" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Stats -->
  <text x="640" y="165" font-family="'IBM Plex Mono', monospace" font-size="36" font-weight="300" fill="#1c6fff" text-anchor="middle">14</text>
  <text x="640" y="185" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="2" fill="rgba(232,229,222,0.35)" text-anchor="middle">SHEETS</text>

  <text x="640" y="230" font-family="'IBM Plex Mono', monospace" font-size="36" font-weight="300" fill="#f5a000" text-anchor="middle">2ms</text>
  <text x="640" y="250" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="2" fill="rgba(232,229,222,0.35)" text-anchor="middle">WRITE</text>

  <text x="640" y="295" font-family="'IBM Plex Mono', monospace" font-size="28" font-weight="300" fill="#1aa167" text-anchor="middle">MIT</text>
  <text x="640" y="315" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="2" fill="rgba(232,229,222,0.35)" text-anchor="middle">LICENSE</text>

  <!-- Footer line -->
  <line x1="0" y1="399" x2="1280" y2="399" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="640" y="389" font-family="'IBM Plex Mono', monospace" font-size="9" letter-spacing="1" fill="rgba(232,229,222,0.2)" text-anchor="middle">github.com/revanthlevaka/OpenYantra -- Conceived in Hyderabad, India</text>
</svg>
