  <text x="470" y="270" font-family="'IBM Plex Mono', monospace" font-size="72" font-weight="600" fill="url(#tg)">Open</text>
  <text x="470" y="358" font-family="'IBM Plex Mono', monospace" font-size="72" font-weight="300" fill="#e8e5de">Yantra</text>
  <text x="472" y="404" font-family="'IBM Plex Mono', monospace" font-size="15" letter-spacing="4" fill="#524f58">PERSONAL COGNITION LEDGER</text>
