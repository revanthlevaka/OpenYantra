  <circle cx="280" cy="315" r="90" stroke="url(#g)" stroke-width="2" fill="none" opacity="0.5"/>
  <circle cx="280" cy="315" r="50" stroke="url(#g)" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="280" cy="315" r="11" fill="url(#g)"/>
  <line x1="280" y1="185" x2="280" y2="445" stroke="url(#g)" stroke-width="1.2" opacity="0.2"/>
  <line x1="150" y1="315" x2="410" y2="315" stroke="url(#g)" stroke-width="1.2" opacity="0.2"/>
  <circle cx="280" cy="185" r="8" fill="#1c6fff"/>
  <circle cx="410" cy="315" r="8" fill="#5535e0"/>
  <circle cx="280" cy="445" r="8" fill="#e84520"/>
  <circle cx="150" cy="315" r="8" fill="#f5a000"/>
  <path d="M280 185 Q345 250 280 315 Q215 250 280 185" stroke="url(#g)" stroke-width="2" fill="none" opacity="0.42"/>
  <path d="M410 315 Q345 380 280 315 Q345 250 410 315" stroke="url(#g)" stroke-width="2" fill="none" opacity="0.42"/>
  <path d="M280 445 Q215 380 280 315 Q345 380 280 445" stroke="url(#g)" stroke-width="2" fill="none" opacity="0.42"/>
  <path d="M150 315 Q215 250 280 315 Q215 380 150 315" stroke="url(#g)" stroke-width="2" fill="none" opacity="0.42"/>
