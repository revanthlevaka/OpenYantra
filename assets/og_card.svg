<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="OpenYantra OG card">
  <defs>
    <!-- Mark gradient diagonal across 260px render area at left anchor -->
    <linearGradient id="og-mark" x1="150" y1="185" x2="410" y2="445" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1c6fff"/>
      <stop offset="33%"  stop-color="#5535e0"/>
      <stop offset="66%"  stop-color="#e84520"/>
      <stop offset="100%" stop-color="#f5a000"/>
    </linearGradient>
    <!-- Top + bottom bar gradient -->
    <linearGradient id="og-bar" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1c6fff"/>
      <stop offset="33%"  stop-color="#5535e0"/>
      <stop offset="66%"  stop-color="#e84520"/>
      <stop offset="100%" stop-color="#f5a000"/>
    </linearGradient>
    <!-- Wordmark gradient horizontal -->
    <linearGradient id="og-text" x1="460" y1="0" x2="860" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1c6fff"/>
      <stop offset="33%"  stop-color="#5535e0"/>
      <stop offset="66%"  stop-color="#e84520"/>
      <stop offset="100%" stop-color="#f5a000"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="og-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.022)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0b"/>
  <!-- Grid texture -->
  <rect width="1200" height="630" fill="url(#og-grid)"/>
  <!-- Top bar -->
  <rect width="1200" height="3" fill="url(#og-bar)"/>
  <!-- Bottom bar -->
  <rect y="627" width="1200" height="3" fill="url(#og-bar)" opacity="0.4"/>

  <!-- Mark — canonical geometry scaled to 260px, left-anchored, centered vertically at y=315 -->
  <!-- scale=2.6, offset: x=150-(50*2.6)=150-130=20 ; y=315-(50*2.6)=315-130=185 -->
  <g transform="translate(20,185) scale(2.6)">
    <circle cx="50" cy="50" r="47" stroke="url(#og-mark)" stroke-width="0.58" fill="none"/>
    <circle cx="50" cy="50" r="33" stroke="url(#og-mark)" stroke-width="0.38" fill="none" opacity="0.5"/>
    <circle cx="50" cy="50" r="18" stroke="url(#og-mark)" stroke-width="0.31" fill="none" opacity="0.3"/>
    <line x1="50" y1="3"  x2="50" y2="97" stroke="url(#og-mark)" stroke-width="0.23" opacity="0.2"/>
    <line x1="3"  y1="50" x2="97" y2="50" stroke="url(#og-mark)" stroke-width="0.23" opacity="0.2"/>
    <line x1="17" y1="17" x2="83" y2="83" stroke="url(#og-mark)" stroke-width="0.19" opacity="0.12"/>
    <line x1="83" y1="17" x2="17" y2="83" stroke="url(#og-mark)" stroke-width="0.19" opacity="0.12"/>
    <circle cx="50" cy="3"  r="2.5" fill="#1c6fff"/>
    <circle cx="97" cy="50" r="2.5" fill="#5535e0"/>
    <circle cx="50" cy="97" r="2.5" fill="#e84520"/>
    <circle cx="3"  cy="50" r="2.5" fill="#f5a000"/>
    <circle cx="50" cy="17" r="1.5" fill="#1c6fff" opacity="0.6"/>
    <circle cx="83" cy="50" r="1.5" fill="#5535e0" opacity="0.6"/>
    <circle cx="50" cy="83" r="1.5" fill="#e84520" opacity="0.6"/>
    <circle cx="17" cy="50" r="1.5" fill="#f5a000" opacity="0.6"/>
    <path d="M50 3 Q68 26 50 50 Q32 26 50 3"   stroke="url(#og-mark)" stroke-width="0.31" fill="none" opacity="0.42"/>
    <path d="M97 50 Q74 68 50 50 Q74 32 97 50"  stroke="url(#og-mark)" stroke-width="0.31" fill="none" opacity="0.42"/>
    <path d="M50 97 Q32 74 50 50 Q68 74 50 97"  stroke="url(#og-mark)" stroke-width="0.31" fill="none" opacity="0.42"/>
    <path d="M3 50 Q26 32 50 50 Q26 68 3 50"    stroke="url(#og-mark)" stroke-width="0.31" fill="none" opacity="0.42"/>
    <path d="M17 17 Q38 38 50 50 Q29 29 17 17"  stroke="url(#og-mark)" stroke-width="0.19" fill="none" opacity="0.2"/>
    <path d="M83 17 Q62 38 50 50 Q71 29 83 17"  stroke="url(#og-mark)" stroke-width="0.19" fill="none" opacity="0.2"/>
    <path d="M83 83 Q62 62 50 50 Q71 71 83 83"  stroke="url(#og-mark)" stroke-width="0.19" fill="none" opacity="0.2"/>
    <path d="M17 83 Q38 62 50 50 Q29 71 17 83"  stroke="url(#og-mark)" stroke-width="0.19" fill="none" opacity="0.2"/>
    <circle cx="50" cy="50" r="4" fill="url(#og-mark)"/>
  </g>

  <!-- Vertical divider between mark and text -->
  <line x1="430" y1="185" x2="430" y2="445" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Text block: x=460, vertically centered -->
  <!-- Product name -->
  <text x="460" y="298"
    font-family="'IBM Plex Mono','Courier New',monospace"
    font-size="72" font-weight="500" letter-spacing="-2"
    fill="url(#og-text)">OpenYantra</text>

  <!-- Tagline -->
  <text x="462" y="344"
    font-family="'IBM Plex Mono','Courier New',monospace"
    font-size="15" font-weight="400" letter-spacing="4"
    fill="#524f58">PERSONAL COGNITION LEDGER</text>

  <!-- Horizontal rule -->
  <rect x="460" y="362" width="300" height="1" fill="rgba(255,255,255,0.07)"/>

  <!-- Description -->
  <text x="462" y="392"
    font-family="'IBM Plex Mono','Courier New',monospace"
    font-size="14" font-weight="300" letter-spacing="0.5"
    fill="#7a7682">Local-first. Human-readable. Agent-safe.</text>

  <!-- Sub-description -->
  <text x="462" y="416"
    font-family="'IBM Plex Mono','Courier New',monospace"
    font-size="13" font-weight="300" letter-spacing="0.5"
    fill="#524f58">One human. One memory file. One trusted writer.</text>
</svg>